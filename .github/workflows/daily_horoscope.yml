name: Daily Horoscope - X Post (毎日7:00 JST)

on:
  schedule:
    # 毎日 7:00 JST = 22:00 UTC（前日）
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (生成のみ、投稿しない)'
        required: false
        default: 'false'
        type: boolean

jobs:
  post-daily-horoscope:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Japanese font (NotoSansJP)
        run: |
          mkdir -p assets/fonts
          curl -L -o assets/fonts/NotoSansJP-Regular.ttf \
            "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf" \
            2>/dev/null || echo "Font download skipped, using fallback"

      - name: Create output directories
        run: mkdir -p output/images output/logs output/content

      - name: Run daily horoscope script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          WEEKLY_NOTE_URL: ${{ vars.WEEKLY_NOTE_URL }}
          NOTE_ACCOUNT_URL: ${{ vars.NOTE_ACCOUNT_URL }}
          LOG_LEVEL: INFO
        run: python scripts/run_daily.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-${{ github.run_number }}
          path: output/logs/
          retention-days: 7
