name: Daily Note - 12星座今日の運勢投稿（毎日7:00 JST）

on:
  schedule:
    # 毎日 7:00 JST = 22:00 UTC（前日）
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (生成のみ、投稿しない)'
        required: false
        default: 'false'
        type: boolean

jobs:
  post-daily-note:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright and browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Download Japanese font
        run: |
          mkdir -p assets/fonts
          curl -L -o assets/fonts/NotoSansJP-Regular.ttf \
            "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf" \
            2>/dev/null || echo "Font download skipped"

      - name: Create output directories
        run: mkdir -p output/images output/logs output/content output/stats output/strategy

      - name: Restore strategy file from cache
        uses: actions/cache@v4
        with:
          path: output/strategy/current_strategy.txt
          key: strategy-${{ github.run_id }}
          restore-keys: |
            strategy-

      - name: Run daily note script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          LOG_LEVEL: INFO
        run: python scripts/run_daily.py

      - name: Analyze performance & update strategy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTE_SESSION_B64: ${{ secrets.NOTE_SESSION_B64 }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
        run: python scripts/analyze_performance.py

      - name: Save strategy to cache
        uses: actions/cache@v4
        with:
          path: output/strategy/current_strategy.txt
          key: strategy-${{ github.run_id }}

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_number }}
          path: |
            output/images/
            output/logs/
            output/stats/
            output/strategy/
          retention-days: 7
